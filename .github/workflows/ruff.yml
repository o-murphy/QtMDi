name: Ruff

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7

    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: uv sync

    - name: Lint with ruff
      run: uv run ruff check
