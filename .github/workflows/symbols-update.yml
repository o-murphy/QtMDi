name: Auto Fonts Update & Release

on:
  workflow_dispatch:

  schedule:
    - cron: '30 1 * * *'  # Runs at 01:30 UTC every day

jobs:
  build-n-release:

    runs-on: ubuntu-latest

    permissions:
      # Give the default GITHUB_TOKEN write permission to commit and push the changed files back to the repository.
      contents: write

    strategy:
      fail-fast: false


    steps:

    - uses: actions/checkout@v7
      with:
        ref: ${{ github.head_ref }}

    - name: Install uv
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: uv sync

    - name: Fetch fonts
      run: uv run python scripts/fetch_fonts.py

    - name: Fix font family names
      run: uv run python scripts/fix_font_families.py

    - name: Regenerate symbols charmap
      run: uv run python scripts/create_symbols_charmap.py

    - name: Write font manifest
      run: uv run python scripts/write_font_manifest.py

    - name: Upload Artifacts
      uses: actions/upload-artifact@v7
      with:
        name: ttf
        path: src/qtmdi/icons/**/*.ttf

    - name: Commit and Push Changes (Fonts update)
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Scheduled material-symbols update"
        commit_options: "--no-verify"
        # Font binaries are gitignored (fetched fresh at build time, see
        # scripts/fetch_fonts.sh); manifest.json's checksums are what
        # actually reveal whether upstream fonts were added, removed or
        # changed, so a commit (and the release below) only happens when
        # something real changed - not on every no-op daily run.
        file_pattern: "src/qtmdi/icons/charmap.json src/qtmdi/icons/manifest.json"

    - name: Check if changes were committed
      id: check_changes
      run: |
        if git log -1 --pretty=%B | grep -q "Scheduled material-symbols update"; then
          echo "changes_made=true" >> $GITHUB_OUTPUT
        else
          echo "changes_made=false" >> $GITHUB_OUTPUT
        fi

    - name: Configure git user
      if: steps.check_changes.outputs.changes_made == 'true'
      run: |
        git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

    - name: Bump version
      if: steps.check_changes.outputs.changes_made == 'true'
      run: uv run bump2version patch --allow-dirty

    - name: Push version to current branch
      if: steps.check_changes.outputs.changes_made == 'true'
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GH_TOKEN }}
        branch: ${{ github.ref }}

    - name: Extract Version
      if: steps.check_changes.outputs.changes_made == 'true'
      id: extract_version
      run: |
        VERSION=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
        echo "Extracted version is $VERSION"
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Create Release
      if: steps.check_changes.outputs.changes_made == 'true'
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
      with:
        tag_name: v${{ env.VERSION }}
        release_name: v${{ env.VERSION }}
        draft: false
        prerelease: false
